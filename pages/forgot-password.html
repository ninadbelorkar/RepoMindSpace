<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RepoMind Space</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body style="background-color: var(--bg-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="card glass-panel" style="max-width: 400px; width: 100%; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="auth-brand" style="margin-bottom: 1rem;">RepoMind Space</div>
            <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Reset Password</h2>
            <p class="text-muted" id="instructionText">Enter your email address and we'll send a 6-digit reset code.</p>
        </div>
        
        <div id="emailSection">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="emailInput" class="form-control" required placeholder="name@company.com">
            </div>
            <div id="emailError" style="color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>
            <button id="sendLinkBtn" class="btn btn-primary" style="width: 100%;">Send Reset Code</button>
        </div>

        <div id="resetSection" style="display: none;">
            <div class="form-group">
                <label class="form-label">6-Digit Reset Code</label>
                <input type="text" id="otpInput" class="form-control" required placeholder="123456" maxlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" id="newPassInput" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" id="confirmPassInput" class="form-control" required>
            </div>
            <div id="resetError" style="color: #ef4444; font-size: 0.875rem; margin-bottom: 1rem; display: none;"></div>
            <button id="resetBtn" class="btn btn-primary" style="width: 100%;">Update Password</button>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.875rem; color: var(--text-muted);">Didn't receive the code? <a href="#" id="resendBtn" style="color: #a855f7;">Resend</a></p>
        </div>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="login.html" class="auth-link">Back to Login</a>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script>
        let requestEmail = null;

        document.getElementById('sendLinkBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value;
            const btn = document.getElementById('sendLinkBtn');
            const errorDiv = document.getElementById('emailError');
            errorDiv.style.display = 'none';

            if (!email) {
                errorDiv.innerText = 'Please enter your email.';
                errorDiv.style.display = 'block';
                return;
            }

            btn.innerText = 'Sending...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                
                if (res.ok) {
                    requestEmail = email;
                    document.getElementById('emailSection').style.display = 'none';
                    document.getElementById('resetSection').style.display = 'block';
                    document.getElementById('instructionText').innerText = `A 6-digit code has been sent to ${email}. Enter it below along with your new password.`;
                } else {
                    throw new Error(data.error || 'Failed to send reset link');
                }
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.innerText = 'Send Reset Code';
                btn.disabled = false;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const otp = document.getElementById('otpInput').value;
            const newPass = document.getElementById('newPassInput').value;
            const confirmPass = document.getElementById('confirmPassInput').value;
            const btn = document.getElementById('resetBtn');
            const errorDiv = document.getElementById('resetError');
            errorDiv.style.display = 'none';

            if (!otp || !newPass || !confirmPass) {
                errorDiv.innerText = 'Please fill out all fields.';
                errorDiv.style.display = 'block';
                return;
            }

            if (newPass !== confirmPass) {
                errorDiv.innerText = 'Passwords do not match.';
                errorDiv.style.display = 'block';
                return;
            }

            btn.innerText = 'Updating...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: requestEmail, otp: otp, new_password: newPass })
                });
                const data = await res.json();
                
                if (res.ok) {
                    alert('Password reset successfully! Please log in.');
                    window.location.href = 'login.html';
                } else {
                    throw new Error(data.error || 'Failed to reset password');
                }
            } catch (err) {
                errorDiv.innerText = err.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.innerText = 'Update Password';
                btn.disabled = false;
            }
        });

        // Resend OTP
        document.getElementById('resendBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            if (!requestEmail) return;
            const resendBtn = document.getElementById('resendBtn');
            resendBtn.textContent = 'Sending...';
            await fetch(`${API_BASE}/api/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: requestEmail })
            });
            resendBtn.textContent = 'Sent!';
            setTimeout(() => { resendBtn.textContent = 'Resend'; }, 3000);
        });
    </script>
</body>
</html>
